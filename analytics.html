<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics | ZEROTH YT</title>
  <link rel="icon" type="image/x-icon" href="img/logo_circle.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout-wrapper">
    <aside class="sidebar">
      <div class="profile-card-new glass-card">
        <div class="profile-top">
          <div class="profile-img-wrapper">
            <img src="img/logo_circle.png" alt="ZEROTH Gaming" class="profile-img" width="80" height="80" style="border-radius: 50%; overflow: hidden; aspect-ratio: 1/1;" />
          </div>
          <div class="profile-header">
            <h1 class="profile-name-new">ZEROTH YT</h1>
            <span class="badge-creator"><i class="fas fa-certificate"></i> V BADGE CREATOR</span>
          </div>
        </div>
        <div class="profile-body">
          <p class="profile-label">GAMER</p>
          <p class="profile-bio-new">Nepali Youtuber With 5 Million Subscriber</p>
        </div>
        <div class="profile-footer">
          <div class="social-mini-grid">
            <a href="https://www.instagram.com/iamzeroth" target="_blank" class="mini-social-btn instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://discord.gg/7YnnNcB7RB" target="_blank" class="mini-social-btn discord"><i class="fab fa-discord"></i></a>
            <a href="https://www.youtube.com/@zerothyt10" target="_blank" class="mini-social-btn youtube"><i class="fab fa-youtube"></i></a>
            <a href="https://www.tiktok.com/@zeroth_ff" target="_blank" class="mini-social-btn tiktok"><i class="fab fa-tiktok"></i></a>
          </div>
        </div>
      </div>
      <nav class="nav-menu glass-card">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home Feed</span></a>
        <a href="shop.html" class="nav-item"><i class="fas fa-shopping-bag"></i><span>Official Shop</span></a>
        <a href="analytics.html" class="nav-item active"><i class="fas fa-chart-line"></i><span>Analytics</span></a>
      </nav>
      <div class="availability-card glass-card">
        <div class="avail-dot"></div>
        <div class="avail-text"><span class="avail-title">Open to Collaborate</span></div>
      </div>
    </aside>

    <main class="main-content">
      <section class="section scroll-reveal" id="analytics">
        <div class="analytics-container-glass glass-card">
          <div class="section-header">
            <div>
              <h2 class="section-title"><i class="fas fa-chart-line"></i> Live Network Growth</h2>
              <p class="section-sub">Real-time stats across all platforms.</p>
            </div>
            <span class="section-badge pulse-badge">● LIVE</span>
          </div>
          <div class="counters-grid">
            <div class="counter-card glass-card" data-target="4700000" id="counterYT">
              <div class="counter-top"><div class="counter-icon yt-icon"><i class="fab fa-youtube"></i></div></div>
              <div class="counter-number">4.7M</div>
              <div class="counter-label">Subscribers</div>
            </div>
            <div class="counter-card glass-card" data-target="1200000" id="counterIG">
              <div class="counter-top"><div class="counter-icon ig-icon"><i class="fab fa-instagram"></i></div></div>
              <div class="counter-number">1.2M</div>
              <div class="counter-label">Followers</div>
            </div>
            <div class="counter-card glass-card" data-target="45000000" id="counterViews">
              <div class="counter-top"><div class="counter-icon views-icon"><i class="fas fa-eye"></i></div></div>
              <div class="counter-number">45M</div>
              <div class="counter-label">Views</div>
            </div>
            <div class="counter-card glass-card" data-target="250000" id="counterTT">
              <div class="counter-top"><div class="counter-icon tt-icon"><i class="fab fa-tiktok"></i></div></div>
              <div class="counter-number">250K</div>
              <div class="counter-label">Fans</div>
            </div>
          </div>
        </div>
      </section>
      <footer class="site-footer">
        <div class="footer-glass">
          <div class="footer-inner"><p>© 2026 ZEROTH YT </p></div>
        </div>
      </footer>
    </main>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
